<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GME - Outpost 31: Gestión de Grupos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #00ff41;
            overflow-x: hidden;
        }

        .group-container {
            border: 1px solid #1a1a1a;
            background: rgba(20, 20, 20, 0.4);
            padding: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .grid-container {
            display: grid;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .grid-global {
            grid-template-columns: repeat(10, 1fr);
        }

        .grid-focus {
            grid-template-columns: repeat(5, 1fr);
        }

        .pixel-node {
            aspect-ratio: 1;
            border: 1px solid #1a1a1a;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .node-global { font-size: 7px; }
        .node-focus { font-size: 11px; padding: 4px; }

        .node-humano { background-color: #111; }
        .node-asimilado { background-color: #062a06; border-color: #00ff41; } 
        .node-cosa { background-color: #4a0000; border-color: #ff0000; box-shadow: inset 0 0 5px #ff0000; }
        .node-muerto { background-color: #222 !important; opacity: 0.4; }
        .node-muerto::after { content: "×"; position: absolute; font-size: 24px; color: red; opacity: 0.5; }

        .inf-level-marker {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .level-primario { background-color: #ff0000; box-shadow: 0 0 4px #ff0000; }
        .level-completa { background-color: #00ff41; }
        .level-imitacion { background-color: #ff00ff; }

        .selected-node {
            outline: 2px solid #fff;
            z-index: 10;
            transform: scale(1.05);
        }

        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #00ff41; }

        input, select, textarea {
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-size: 10px;
            padding: 2px 4px;
        }

        .view-tab {
            padding: 4px 8px;
            font-size: 9px;
            border: 1px solid #333;
            cursor: pointer;
            transition: background 0.2s;
        }
        .view-tab.active {
            background: #00ff41;
            color: #000;
            border-color: #00ff41;
        }

        .role-tag {
            font-size: 8px;
            padding: 1px 3px;
            background: #1a1a1a;
            border: 1px solid #333;
            margin-top: 2px;
            text-transform: uppercase;
            color: #aaa;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 65, 0.01), transparent);
            animation: scanline 10s linear infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
    </style>
</head>
<body class="p-4">
    <div class="scanline"></div>

    <div class="max-w-[1600px] mx-auto">
        <header class="border-b border-green-900 pb-2 mb-4 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-green-500">GME_SYSTEM // ROLES_Y_ESPECIALIDADES</h1>
                <p class="text-[8px] opacity-70">SISTEMA DE MONITOREO BIOMÉTRICO (NUBE ACTIVA) - OUTPOST 31</p>
            </div>
            
            <div id="view-selector" class="flex gap-1">
                <div class="view-tab active" onclick="changeView('all')">VISTA GLOBAL</div>
                <div class="view-tab" onclick="changeView(0)">ALFA</div>
                <div class="view-tab" onclick="changeView(1)">BETA</div>
                <div class="view-tab" onclick="changeView(2)">GAMMA</div>
                <div class="view-tab" onclick="changeView(3)">DELTA</div>
                <div class="view-tab" onclick="changeView(4)">ÉPSILON</div>
            </div>

            <div class="flex gap-4">
                <button onclick="toggleAdmin()" id="admin-btn" class="text-[10px] border border-green-800 px-3 py-1 hover:bg-green-900/30">MODO_ADMIN: OFF</button>
                <div class="text-right">
                    <p id="stat-summary" class="text-[10px] font-bold">CONECTANDO...</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            
            <div class="col-span-3 space-y-4">
                <div class="bg-zinc-900/80 p-3 border border-zinc-700">
                    <h2 class="text-[10px] font-bold mb-2 text-zinc-400 uppercase">Resumen de Grupos</h2>
                    <div id="squad-stats" class="space-y-1 text-[9px]"></div>
                </div>

                <div class="bg-zinc-900/80 p-3 border border-blue-900">
                    <h2 class="text-xs font-bold mb-1 text-blue-400 uppercase">Carga Masiva</h2>
                    <textarea id="bulk-input" class="w-full h-20 mb-2 font-mono text-[9px]" placeholder="P00,Nombre..."></textarea>
                    <button onclick="processBulkLoad()" class="w-full bg-blue-900/30 border border-blue-500 text-[9px] py-1 hover:bg-blue-500 hover:text-white">ACTUALIZAR NOMBRES</button>
                </div>

                <div class="bg-zinc-900/80 p-3 border border-green-900">
                    <h2 class="text-xs font-bold mb-2 border-b border-green-900 pb-1 text-green-400 text-center">EDITOR SELECCIÓN</h2>
                    <div id="editor-ui" class="space-y-2 opacity-50 pointer-events-none text-[9px]">
                        <div><label>ID:</label> <input type="text" id="edit-id" class="w-full" readonly></div>
                        <div><label>NOMBRE:</label> <input type="text" id="edit-name" class="w-full"></div>
                        
                        <div><label>ESPECIALIDAD:</label> 
                            <select id="edit-especialidad" class="w-full">
                                <option value="Sin especialidad">SIN ESPECIALIDAD</option>
                                <option value="Científico">CIENTÍFICO</option>
                                <option value="Piloto">PILOTO</option>
                            </select>
                        </div>

                        <div class="border-t border-zinc-800 my-1 pt-1"></div>

                        <div><label>ESTADO:</label> 
                            <select id="edit-estado" class="w-full">
                                <option value="Vivo">VIVO</option>
                                <option value="Muerto">MUERTO</option>
                            </select>
                        </div>
                        <div><label>ROL BIOLÓGICO:</label> 
                            <select id="edit-rol" class="w-full" onchange="toggleInfectionUI()">
                                <option value="Humano">HUMANO</option>
                                <option value="Asimilado">ASIMILADO</option>
                                <option value="Cosa">LA COSA</option>
                            </select>
                        </div>
                        <div id="infection-level-container" class="hidden border-t border-red-900/50 pt-2 mt-2">
                            <label class="text-red-500 font-bold block mb-1">NIVEL DE INFECCIÓN:</label> 
                            <select id="edit-infeccion" class="w-full border-red-900">
                                <option value="Ninguno">N/A (HUMANO)</option>
                                <option value="Espécimen primario">ESPÉCIMEN PRIMARIO</option>
                                <option value="Asimilación completa">ASIMILACIÓN COMPLETA</option>
                                <option value="Imitación de tejido">IMITACIÓN DE TEJIDO</option>
                            </select>
                        </div>
                        <button onclick="saveChanges()" class="w-full bg-green-900/40 border border-green-500 py-1 mt-2 hover:bg-green-500 hover:text-black">GUARDAR</button>
                    </div>
                </div>
            </div>

            <div class="col-span-6 space-y-4">
                <div id="groups-container"></div>
            </div>

            <div class="col-span-3 flex flex-col gap-4 h-[750px]">
                <div class="bg-black border border-zinc-800 flex flex-grow overflow-hidden flex-col">
                    <div class="bg-zinc-900 p-1 text-[9px] font-bold border-b border-zinc-700 flex justify-between">
                        <span>LOG_BIOMETRICO</span>
                        <span class="text-red-500 animate-pulse">STREAM</span>
                    </div>
                    <div id="terminal" class="p-2 text-[9px] space-y-1 overflow-y-auto terminal-scroll font-mono flex-grow"></div>
                </div>
                
                <div class="bg-zinc-900/30 p-2 border border-zinc-800 h-24 overflow-hidden">
                    <div id="json-output" class="text-[8px] font-mono opacity-60 break-all overflow-y-auto h-full text-zinc-500">{}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Integración de módulos Firebase para sincronización cloud -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const GRUPOS = [
            { id: 0, nombre: "Grupo ALFA", color: "border-red-900" },
            { id: 1, nombre: "Grupo BETA", color: "border-blue-900" },
            { id: 2, nombre: "Grupo GAMMA", color: "border-yellow-900" },
            { id: 3, nombre: "Grupo DELTA", color: "border-purple-900" },
            { id: 4, nombre: "Grupo ÉPSILON", color: "border-zinc-700" }
        ];

        let participants = [];
        let selectedId = null;
        let isAdmin = false;
        let currentView = 'all';

        // Variables Firebase
        let db, auth, appId, userId;
        let user = null;

        async function init() {
            // Inicializar Firebase si el entorno lo provee
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                    // Protocolo de Autenticación Requerida
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, async (u) => {
                        user = u;
                        if (user) {
                            userId = user.uid;
                            log("PERSISTENCIA: Canal seguro activado. Descargando simulación...", "text-blue-400");
                            await loadFromCloud();
                        }
                    });
                } catch (e) {
                    console.error("Error inicializando almacenamiento cloud:", e);
                    log("CONEXIÓN: Error de red. Utilizando memoria temporal del sistema.", "text-yellow-500");
                    generateFallbackState();
                    renderAll();
                }
            } else {
                // Modo local offline
                log("PERSISTENCIA: Ejecución sin variables de entorno. Guardado temporal activo.", "text-yellow-500");
                generateFallbackState();
                renderAll();
            }
        }

        // Genera el estado por defecto cuando no hay conexión o no hay save previo
        function generateFallbackState() {
            const vectorIndex = Math.floor(Math.random() * 100);
            participants = [];
            for (let i = 0; i < 100; i++) {
                const groupIdx = Math.floor(i / 20);
                participants.push({
                    id: `P${String(i).padStart(2, '0')}`,
                    nombre: `Sujeto_${i}`,
                    grupoId: groupIdx,
                    especialidad: "Sin especialidad",
                    rol: i === vectorIndex ? 'Cosa' : 'Humano',
                    infeccion: i === vectorIndex ? 'Espécimen primario' : 'Ninguno',
                    estado: 'Vivo'
                });
            }

            for (let g = 0; g < 5; g++) {
                const groupMembers = participants.filter(p => p.grupoId === g);
                const shuffledIds = groupMembers.map(p => p.id).sort(() => 0.5 - Math.random());
                participants.find(p => p.id === shuffledIds[0]).especialidad = "Piloto";
                participants.find(p => p.id === shuffledIds[1]).especialidad = "Científico";
            }
        }

        // Descarga de datos segura
        async function loadFromCloud() {
            if (!user || !db) return;
            try {
                // Regla estricta de rutas de acceso para datos privados de usuario
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'saves', 'current_simulation');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    participants = docSnap.data().participants;
                    log("NUBE: Estado anterior de la base restaurado con éxito.", "text-blue-400");
                } else {
                    log("NUBE: No se encontraron simulaciones previas. Inicializando datos de fábrica...", "text-yellow-500");
                    generateFallbackState();
                    await saveToCloud();
                }
                renderAll();
            } catch (e) {
                console.error("Error al descargar el estado:", e);
                log("NUBE ERROR: No se pudieron descargar tus datos guardados.", "text-red-500");
                generateFallbackState();
                renderAll();
            }
        }

        // Guardado persistente automático
        async function saveToCloud() {
            if (!user || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'saves', 'current_simulation');
                await setDoc(docRef, {
                    participants: participants,
                    lastSync: new Date().getTime()
                });
                log("NUBE: Datos sincronizados y guardados automáticamente.", "text-blue-500");
            } catch (e) {
                console.error("Error al guardar estado:", e);
                log("NUBE ERROR: No se pudieron subir tus cambios a la base de datos.", "text-red-500");
            }
        }

        function toggleInfectionUI() {
            const rol = document.getElementById('edit-rol').value;
            const container = document.getElementById('infection-level-container');
            if (rol !== 'Humano') {
                container.classList.remove('hidden');
                if (document.getElementById('edit-infeccion').value === 'Ninguno') {
                    document.getElementById('edit-infeccion').value = 'Asimilación completa';
                }
            } else {
                container.classList.add('hidden');
                document.getElementById('edit-infeccion').value = 'Ninguno';
            }
        }

        function changeView(view) {
            currentView = view;
            document.querySelectorAll('.view-tab').forEach((tab, idx) => {
                const isAll = view === 'all' && idx === 0;
                const isSelectedGroup = typeof view === 'number' && idx === (view + 1);
                tab.classList.toggle('active', isAll || isSelectedGroup);
            });
            renderGroups();
        }

        function renderAll() {
            renderGroups();
            updateStats();
        }

        function renderGroups() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';

            const groupsToRender = currentView === 'all' ? GRUPOS : [GRUPOS[currentView]];

            groupsToRender.forEach(grupo => {
                const isFocused = currentView !== 'all';
                const section = document.createElement('div');
                section.className = `group-container border-l-4 ${grupo.color}`;
                
                const header = document.createElement('div');
                header.className = "flex justify-between items-center mb-3";
                header.innerHTML = `<span class="${isFocused ? 'text-lg' : 'text-[10px]'} font-bold text-zinc-300">${grupo.nombre}</span>`;
                
                const grid = document.createElement('div');
                grid.className = `grid-container ${isFocused ? 'grid-focus' : 'grid-global'}`;

                const members = participants.filter(p => p.grupoId === grupo.id);
                members.forEach(p => {
                    const node = document.createElement('div');
                    const showRole = isAdmin || p.estado === 'Muerto';
                    
                    let roleClass = 'node-humano';
                    if (showRole) {
                        if (p.rol === 'Cosa') roleClass = 'node-cosa';
                        else if (p.rol === 'Asimilado') roleClass = 'node-asimilado';
                    }

                    node.className = `pixel-node ${roleClass} ${p.estado === 'Muerto' ? 'node-muerto' : ''} ${isFocused ? 'node-focus' : 'node-global'}`;
                    if (p.id === selectedId) node.classList.add('selected-node');

                    const displayName = isFocused ? p.nombre : p.nombre.substring(0, 8);
                    
                    let infLevelHTML = '';
                    if (isAdmin && p.rol !== 'Humano') {
                        let levelClass = '';
                        if (p.infeccion === 'Espécimen primario') levelClass = 'level-primario';
                        else if (p.infeccion === 'Asimilación completa') levelClass = 'level-completa';
                        else if (p.infeccion === 'Imitación de tejido') levelClass = 'level-imitacion';
                        infLevelHTML = `<div class="inf-level-marker ${levelClass}"></div>`;
                    }

                    const specHTML = (isFocused && p.especialidad !== "Sin especialidad") 
                        ? `<div class="role-tag">${p.especialidad}</div>` 
                        : '';

                    node.innerHTML = `
                        ${infLevelHTML}
                        <span class="font-bold ${isFocused ? 'mb-0 text-xs' : 'mb-1'}">${p.id}</span>
                        <span class="opacity-80 break-words w-full px-1">${displayName}</span>
                        ${specHTML}
                    `;

                    node.onclick = () => selectSujeto(p.id);
                    grid.appendChild(node);
                });

                section.appendChild(header);
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function selectSujeto(id) {
            selectedId = id;
            const p = participants.find(x => x.id === id);
            const editor = document.getElementById('editor-ui');
            editor.classList.remove('opacity-50', 'pointer-events-none');
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-name').value = p.nombre;
            document.getElementById('edit-rol').value = p.rol;
            document.getElementById('edit-estado').value = p.estado;
            document.getElementById('edit-infeccion').value = p.infeccion;
            document.getElementById('edit-especialidad').value = p.especialidad;
            toggleInfectionUI();
            renderGroups();
        }

        async function saveChanges() {
            const pIndex = participants.findIndex(x => x.id === selectedId);
            const prev = {...participants[pIndex]};
            
            participants[pIndex].nombre = document.getElementById('edit-name').value;
            participants[pIndex].rol = document.getElementById('edit-rol').value;
            participants[pIndex].estado = document.getElementById('edit-estado').value;
            participants[pIndex].infeccion = document.getElementById('edit-infeccion').value;
            participants[pIndex].especialidad = document.getElementById('edit-especialidad').value;
            
            log(`ACTUALIZACIÓN: ${selectedId} actualizado. Especialidad: ${participants[pIndex].especialidad}.`);
            
            updateStats();
            renderGroups();
            await saveToCloud(); // Sincroniza inmediatamente
            
            document.getElementById('json-output').innerText = JSON.stringify({
                action: "biometric_update",
                id: selectedId,
                specialty: participants[pIndex].especialidad,
                biotype: participants[pIndex].rol,
                infection: participants[pIndex].infeccion
            });
        }

        async function processBulkLoad() {
            const input = document.getElementById('bulk-input').value;
            const lines = input.split('\n');
            let count = 0;
            lines.forEach(l => {
                const parts = l.split(',');
                if (parts.length >= 2) {
                    const id = parts[0].trim().toUpperCase();
                    const name = parts.slice(1).join(',').trim();
                    const p = participants.find(x => x.id.toUpperCase() === id);
                    if (p) { p.nombre = name; count++; }
                }
            });
            log(`CARGA MASIVA: ${count} registros vinculados.`, 'text-blue-400');
            renderAll();
            await saveToCloud(); // Sincroniza la carga masiva
        }

        function updateStats() {
            const vivos = participants.filter(p => p.estado === 'Vivo');
            const asimilados = vivos.filter(p => p.rol !== 'Humano').length;
            const muertos = participants.filter(p => p.estado === 'Muerto').length;
            
            document.getElementById('stat-summary').innerText = `H: ${vivos.length - asimilados} | A: ${asimilados} | M: ${muertos}`;
            
            const squadStats = document.getElementById('squad-stats');
            squadStats.innerHTML = '';
            GRUPOS.forEach((g) => {
                const groupP = participants.filter(p => p.grupoId === g.id);
                const gVivos = groupP.filter(p => p.estado === 'Vivo').length;
                const gAsim = groupP.filter(p => p.estado === 'Vivo' && p.rol !== 'Humano').length;
                const div = document.createElement('div');
                div.className = "flex justify-between border-b border-zinc-800 pb-1 cursor-pointer hover:text-white";
                div.onclick = () => changeView(g.id);
                div.innerHTML = `<span>${g.nombre}</span> <span>V:${gVivos} <span class="text-red-500">A:${gAsim}</span></span>`;
                squadStats.appendChild(div);
            });
        }

        function log(msg, color = 'text-green-500') {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = color;
            div.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            term.prepend(div);
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('admin-btn').innerText = `MODO_ADMIN: ${isAdmin ? 'ON' : 'OFF'}`;
            log(`SISTEMA: Privilegios de administrador ${isAdmin ? 'CONCEDIDOS' : 'REVOCADOS'}.`);
            renderGroups();
        }

        // Exponer funciones al entorno global window para mantener compatibilidad con onclick inline de HTML
        window.init = init;
        window.changeView = changeView;
        window.selectSujeto = selectSujeto;
        window.saveChanges = saveChanges;
        window.processBulkLoad = processBulkLoad;
        window.toggleAdmin = toggleAdmin;
        window.toggleInfectionUI = toggleInfectionUI;

        window.onload = init;
    </script>
</body>
</html>
